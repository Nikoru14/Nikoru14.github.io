<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>User Interaction Demo</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="./script.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden">
    <a-scene renderer="colorManagement: true">
      <a-assets>
        <a-asset-item
          id="cuphead"
          response-type="arraybuffer"
          src="./cuphead.glb"
        ></a-asset-item>
        <a-asset-item
          id="enemy"
          response-type="arraybuffer"
          src="./ghost.glb"
        ></a-asset-item>
        <img id="sky" src="./assets/sky.png" />
        <img id="logo" src="./assets//cuphead-logo.png" />
        <audio id="footsteps" src="./assets/footstep_sfx.mp3"></audio>
        <audio id="bgm" src="./assets/bgm.mp3"></audio>
        <audio id="boo" src="./assets/boo.mp3"></audio>
      </a-assets>
      <a-entity
        cuphead-event
        id="cuphead-model"
        gltf-model="#cuphead"
        scale="1 1 1"
        position="-1 0 -5"
        rotation="0 0 0"
      >
      </a-entity>
      <a-entity
        enemy-event
        id="enemy-model"
        gltf-model="#enemy"
        scale="0.01 0.01 0.01"
        position="2 0 -5"
        rotation="0 0 0"
      >
      </a-entity>
      <a-sky src="#sky"></a-sky>
      <a-image
        src="#logo"
        position="0 4.383 -4.826"
        height="1"
        width="3.5"
      ></a-image>
      <a-text
        id="cupheadText"
        value="Click to toggle animation."
        position="-1.16 2.570 -4"
        color="black"
        visible="false"
      ></a-text>
      <a-plane
        position="0 0 -4"
        rotation="-90 0 0"
        width="30"
        height="30"
        color="#9DA059"
      ></a-plane>
      <a-sound src="#bgm" autoplay="true" loop="true" volume="0.20"></a-sound>
      <a-sound src="#footsteps" autoplay="false" volume="2"></a-sound>
      <a-sound src="#boo" autoplay="false" volume="2"></a-sound>
      <a-entity cursor="rayOrigin:mouse"></a-entity>
      <a-entity cursor="fuse: true; fuseTimeout: 500"></a-entity>
    </a-scene>
  </body>
</html>
